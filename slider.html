<style>
    .slider__contti{
        height: 250px;
        margin: auto;
        position: relative;
        width: 90%;
        display: grid;
        place-items: center;
        overflow: hidden;
    }
    .slide__track{
        display: flex;
        width: calc(250px * 18);
        animation: scroll 40s linear infinite;
    }

    .slide__track:hover{
        animation-play-state: paused;
    }

    @keyframes scroll{
        0%{
            transform: translateX(0);
        }
        100%{
            transform: translateX(calc(-250px * 9));
        }
    }
    .slide_picture{
        height: 200px;
        width: 250px;
        display: flex;
        align-items: center;
        padding: 15px;
        perspective: 100px;
    }

    img{
        width: 100%;
        transition: transform 1s;
    }
    img:hover{
        transform: translateZ(20px);
    }

    /*******************Gradient shadows implementation*********************/
      .slider__contti::before,
      .slider__contti::after{
        background: linear-gradient(to right, rgba(255,255,255,1) 0%,
        rgba(255,255,255,0)100%);
        content: '';
        height: 100%;
        position: absolute;
        width: 15%;
        z-index: 2;
      }
     .slider__contti::before{
        left: 0;
        top: 0;
     }

     .slider__contti::after{
        right: 0;
        top: 0;
        transform: rotate(180deg);
     }

</style>
